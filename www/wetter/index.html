    <title>Wetter</title>
    <script>
        // Location Override Logic (Muss VOR app.js laufen)
        // Wenn ein Ort manuell gewählt wurde, simulieren wir diesen als GPS-Position.
        (function() {
            const savedLoc = localStorage.getItem('rx_weather_location');
            if (savedLoc) {
                try {
                    const loc = JSON.parse(savedLoc);
                    // Wir überschreiben die Geolocation API, damit app.js den gewählten Ort nutzt
                    const originalGetCurrentPosition = navigator.geolocation.getCurrentPosition;
                    navigator.geolocation.getCurrentPosition = function(success, error, options) {
                        const pos = {
                            coords: {
                                latitude: loc.lat,
                                longitude: loc.lon,
                                accuracy: 10,
                                altitude: null, altitudeAccuracy: null, heading: null, speed: null
                            },
                            timestamp: Date.now()
                        };
                        // Asynchron simulieren
                        setTimeout(() => success(pos), 10);
                    };
                    console.log('Wetter-Standort überschrieben:', loc.name);
                } catch(e) { console.error(e); }
            }
        })();
    </script>

    <style>
        /* Layout Fixes */
        #weather { display: flex; flex-direction: column; gap: 16px; padding-bottom: 40px; }
        
        /* Hauptkarte (Aktuelles Wetter) */
        .weather-main-card { 
            text-align: center; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            min-height: auto;
            background: linear-gradient(180deg, var(--card-background) 0%, var(--background-color) 100%);
            border: 1px solid var(--border-color);
        }
        
        #placeName { 
            font-size: 22px; 
            font-weight: 600; 
            color: var(--text-color); 
            margin: 0 0 2px 0; 
        }
        
        #icon svg { 
            width: 100px; 
            height: 100px; 
            margin: 15px auto; 
            display: block; 
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.15));
        }
        
        #temp { 
            font-size: 56px; 
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -2px;
            color: var(--text-color);
            line-height: 1;
        }

        #currentSummary {
            font-size: 16px;
            color: var(--secondary-text-color);
            font-weight: 500;
            margin-bottom: 5px;
            line-height: 1.4;
            margin-top: 5px;
        }

        /* Details Grid (Wind, Sonnenaufgang etc.) */
        #details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
        }
        
        #details > div {
            background: rgba(128, 128, 128, 0.05);
            padding: 12px;
            border-radius: var(--card-radius);
            font-size: 13px;
            color: var(--text-color);
            text-align: center;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* Suche */
        .searchContainer { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 0; 
            position: relative; 
        }
        #searchBox { 
            flex-grow: 1; 
            background: var(--background-color); 
            color: var(--text-color); 
            border: none; 
            padding: 14px 16px; 
            border-radius: 12px; 
            font-size: 16px;
            outline: none;
            transition: background 0.2s;
        }
        #searchBox:focus { background: var(--border-color); }

        #geoBtn { 
            width: 44px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            padding: 10px;
            cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.2s;
        }
        #geoBtn:active { opacity: 0.7; }
        #geoBtn svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2; }

        #suggestionsList {
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: var(--card-background);
            border-radius: 12px;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            overflow: hidden;
        }
        
        /* Neue Styles für Suchergebnisse */
        .suggestion-item {
            display: flex; align-items: center; padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer; transition: background 0.2s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background: var(--background-color); }
        
        .suggestion-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--button-secondary-bg); color: var(--text-color); display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
        .suggestion-icon svg { width: 20px; height: 20px; }
        .suggestion-info { flex: 1; min-width: 0; text-align: left; }
        .suggestion-title { font-size: 15px; font-weight: 600; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .suggestion-desc { font-size: 12px; color: var(--secondary-text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        /* Stunden-Vorschau */
        #hourlyForecastGrid { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            padding: 15px 0 5px 0; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; /* Firefox */
        }
        #hourlyForecastGrid::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .hour { 
            min-width: 65px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 12px 8px;
            background: var(--background-color);
            border-radius: var(--card-radius);
        }
        .hour strong { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: var(--secondary-text-color);
        }
        .hour svg { 
            width: 36px; 
            height: 36px; 
            margin: 8px 0; 
            display: block; 
        }
        .hour div:last-child { font-weight: 600; font-size: 15px; }

        /* 7-Tage Liste */
        #forecastGrid { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; }
        .day {
            display: grid; 
            grid-template-columns: 60px 40px 1fr auto; 
            align-items: center; 
            gap: 10px;
            padding: 10px 14px; 
            background: var(--background-color);
            border-radius: var(--card-radius);
            font-size: 16px;
            color: var(--text-color);
        }
        .day .icon svg { width: 28px; height: 28px; }
        
        /* Special Params Dashboard Overrides */
        #specialParamsDashboard ul {
            display: grid !important;
            grid-template-columns: 1fr 1fr !important;
            gap: 10px !important;
            margin-top: 20px !important;
        }
        #specialParamsDashboard li {
            background: var(--background-color) !important;
            color: var(--text-color) !important;
            border-radius: 14px !important;
            padding: 12px !important;
            font-size: 13px !important;
            display: flex !important;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: none !important;
            flex: auto !important;
        }
        #specialParamsDashboard li strong {
            font-size: 15px;
            margin-top: 2px;
            color: var(--accent-color);
        }
        #specialParamsDashboard li .icon {
            width: 28px; height: 28px; margin-bottom: 6px; color: var(--secondary-text-color);
        }

        /* Skeleton Loading */
        #loading-skeleton {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }
        .skeleton-card {
            background: var(--card-background);
            border-radius: 20px;
            padding: 20px;
            overflow: hidden;
        }
        .skeleton-block {
            background: var(--background-color);
            border-radius: 8px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        /* Sun Widget Styles */
        .sun-detail-box {
            background: var(--background-color);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        .sun-label { font-size: 11px; color: var(--secondary-text-color); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .sun-time { font-size: 20px; font-weight: 700; margin: 4px 0; color: var(--text-color); }
        .sun-sub { font-size: 11px; opacity: 0.7; color: var(--text-color); }
        
        /* Slider Customization */
        input[type=range] {
            height: 6px; border-radius: 3px; background: rgba(128,128,128,0.2);
            -webkit-appearance: none; margin: 10px 0;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }
    </style>
</head>

    <script>
        // Skeleton Logic
        const weatherContainer = document.getElementById('weather');
        const skeleton = document.getElementById('loading-skeleton');
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    skeleton.style.display = weatherContainer.style.display !== 'none' ? 'none' : 'flex';
                }
            });
        });
        observer.observe(weatherContainer, { attributes: true });

        // --- SEARCH LOGIC ---
        const searchBox = document.getElementById('searchBox');
        const suggestionsList = document.getElementById('suggestionsList');
        const geoBtn = document.getElementById('geoBtn');
        let stations = [];
        let debounceTimer;

        // 1. Bahnhöfe laden
        async function loadStations() {
            try {
                const res = await fetch('../data/DE_stations.json');
                const data = await res.json();
                stations = data.elements || [];
            } catch (e) { console.warn('Stations load failed', e); }
        }
        
        // Verzögertes Laden für Performance
        setTimeout(loadStations, 200);

        // 2. Suche ausführen
        searchBox.addEventListener('input', (e) => {
            const term = e.target.value.trim();
            clearTimeout(debounceTimer);
            
            if (term.length < 2) {
                suggestionsList.innerHTML = '';
                return;
            }

            debounceTimer = setTimeout(async () => {
                suggestionsList.innerHTML = '<div class="suggestion-item" style="justify-content:center; color:var(--secondary-text-color);">Suche...</div>';
                
                // A. Bahnhöfe filtern
                const stationResults = stations
                    .filter(s => s.tags.name && s.tags.name.toLowerCase().includes(term.toLowerCase()))
                    .slice(0, 3)
                    .map(s => ({
                        name: s.tags.name,
                        desc: 'Bahnhof',
                        lat: s.lat,
                        lon: s.lon,
                        type: 'station'
                    }));

                // B. Orte via OpenMeteo suchen
                let cityResults = [];
                try {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(term)}&count=5&language=de&format=json`);
                    const geoData = await geoRes.json();
                    if (geoData.results) {
                        cityResults = geoData.results.map(c => ({
                            name: c.name,
                            desc: `${c.admin1 || ''}, ${c.country || ''}`,
                            lat: c.latitude,
                            lon: c.longitude,
                            type: 'city'
                        }));
                    }
                } catch(e) { console.warn('Geo search failed', e); }

                renderSuggestions([...stationResults, ...cityResults]);
            }, 400);
        });

        function renderSuggestions(results) {
            suggestionsList.innerHTML = '';
            if (results.length === 0) {
                suggestionsList.innerHTML = '<div class="suggestion-item" style="justify-content:center; color:var(--secondary-text-color);">Keine Ergebnisse</div>';
                return;
            }

            results.forEach(res => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                
                const icon = res.type === 'station' 
                    ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="m8 19-2 3"/><path d="m16 19 2 3"/></svg>'
                    : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>';

                div.innerHTML = `
                    <div class="suggestion-icon">${icon}</div>
                    <div class="suggestion-info">
                        <div class="suggestion-title">${res.name}</div>
                        <div class="suggestion-desc">${res.desc}</div>
                    </div>
                `;
                
                div.onclick = () => selectLocation(res);
                suggestionsList.appendChild(div);
            });
        }

        function selectLocation(loc) {
            // Speichern und Reload, damit der Override oben greift
            localStorage.setItem('rx_weather_location', JSON.stringify(loc));
            window.location.reload();
        }

        // GPS Button: Zurücksetzen auf echten Standort
        geoBtn.addEventListener('click', () => {
            localStorage.removeItem('rx_weather_location');
            window.location.reload();
        });

        // --- SUN CALC & VISUALIZATION ---
        const SunCalc = (function() {
            const PI = Math.PI, sin = Math.sin, cos = Math.cos, tan = Math.tan, asin = Math.asin, atan = Math.atan2, acos = Math.acos, rad = PI / 180;
            const dayMs = 1000 * 60 * 60 * 24, J1970 = 2440588, J2000 = 2451545;
            function toJulian(date) { return date.valueOf() / dayMs - 0.5 + J1970; }
            function toDays(date) { return toJulian(date) - J2000; }
            function getRightAscension(l, b) { return atan(sin(l) * cos(23.4393 * rad) - tan(b) * sin(23.4393 * rad), cos(l)); }
            function getDeclination(l, b) { return asin(sin(b) * cos(23.4393 * rad) + cos(b) * sin(23.4393 * rad) * sin(l)); }
            function getAzimuth(H, phi, dec) { return atan(sin(H), cos(H) * sin(phi) - tan(dec) * cos(phi)); }
            function getAltitude(H, phi, dec) { return asin(sin(phi) * sin(dec) + cos(phi) * cos(dec) * cos(H)); }
            function getSiderealTime(d, lw) { return rad * (280.16 + 360.9856235 * d) - lw; }
            function getSolarMeanAnomaly(d) { return rad * (357.5291 + 0.98560028 * d); }
            function getEclipticLongitude(M) { const C = rad * (1.9148 * sin(M) + 0.02 * sin(2 * M) + 0.0003 * sin(3 * M)), P = rad * 102.9372; return M + C + P + PI; }
            function getSunCoords(d) { const M = getSolarMeanAnomaly(d), L = getEclipticLongitude(M); return { dec: getDeclination(L, 0), ra: getRightAscension(L, 0) }; }
            
            return {
                getPosition: function(date, lat, lng) {
                    const lw = rad * -lng, phi = rad * lat, d = toDays(date), c = getSunCoords(d), H = getSiderealTime(d, lw) - c.ra;
                    return { azimuth: getAzimuth(H, phi, c.dec), altitude: getAltitude(H, phi, c.dec) };
                },
                getTimes: function(date, lat, lng) {
                    const rad = PI / 180, J0 = 0.0009;
                    function getJulianCycle(d, lw) { return Math.round(d - J0 - lw / (2 * PI)); }
                    function getApproxSolarTransit(Ht, lw, n) { return J0 + (Ht + lw) / (2 * PI) + n; }
                    function getSolarTransitJ(ds, M, L) { return J2000 + ds + 0.0053 * sin(M) - 0.0069 * sin(2 * L); }
                    function getHourAngle(h, phi, dec) { return acos((sin(h) - sin(phi) * sin(dec)) / (cos(phi) * cos(dec))); }
                    
                    const lw = rad * -lng, phi = rad * lat, d = toDays(date), n = getJulianCycle(d, lw), ds = getApproxSolarTransit(0, lw, n), M = getSolarMeanAnomaly(ds), L = getEclipticLongitude(M), dec = getDeclination(L, 0), Jnoon = getSolarTransitJ(ds, M, L);
                    
                    function getTime(h) {
                        const w = getHourAngle(h * rad, phi, dec);
                        if (isNaN(w)) return {}; 
                        const Jset = Jnoon + w / (2 * PI), Jrise = Jnoon - w / (2 * PI);
                        return { rise: new Date((Jrise + 0.5 - J1970) * dayMs), set: new Date((Jset + 0.5 - J1970) * dayMs) };
                    }
                    
                    const times = getTime(-0.833); // Sunrise/Sunset
                    const golden = getTime(6); // Golden Hour (6 degrees)
                    const blue = getTime(-6); // Civil Twilight (-6 degrees)
                    
                    return {
                        sunrise: times.rise, sunset: times.set,
                        goldenHourMorningEnd: golden.rise, goldenHourEveningStart: golden.set,
                        blueHourMorningStart: blue.rise, blueHourEveningEnd: blue.set,
                        solarNoon: new Date((Jnoon + 0.5 - J1970) * dayMs)
                    };
                }
            };
        })();

        let simulatedTime = null;
        window.lastKnownPos = null; // Cache für Slider

        function updateSunWidget(lat, lon) {
            window.lastKnownPos = { lat, lon };
            const now = new Date();
            // Nutze simulierte Zeit falls gesetzt, sonst aktuelle
            const targetDate = simulatedTime ? simulatedTime : now;
            
            const times = SunCalc.getTimes(now, lat, lon); // Zeiten für HEUTE (Aufgang/Untergang ändern sich kaum)
            const pos = SunCalc.getPosition(targetDate, lat, lon);
            
            // Format Helper
            const fmt = d => d ? d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--:--';
            
            // Update Text
            document.getElementById('sunrise-time').textContent = fmt(times.sunrise);
            document.getElementById('sunset-time').textContent = fmt(times.sunset);
            document.getElementById('blue-morning').textContent = fmt(times.blueHourMorningStart);
            document.getElementById('blue-evening').textContent = fmt(times.blueHourEveningEnd);
            
            if (times.goldenHourMorningEnd && times.goldenHourEveningStart) {
                document.getElementById('golden-hour-box').style.display = 'block';
                document.getElementById('golden-morning').textContent = `${fmt(times.sunrise)} - ${fmt(times.goldenHourMorningEnd)}`;
                document.getElementById('golden-evening').textContent = `${fmt(times.goldenHourEveningStart)} - ${fmt(times.sunset)}`;
            }

            // Status Text
            let status = 'Tag';
            const altDeg = pos.altitude * (180/Math.PI);
            if (altDeg < -18) status = 'Nacht';
            else if (altDeg < -6) status = 'Dämmerung';
            else if (altDeg < 0) status = 'Blaue Stunde';
            else if (altDeg < 6) status = 'Goldene Stunde';
            document.getElementById('sun-current-status').textContent = status;

            // Draw Canvas
            const canvas = document.getElementById('sun-canvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width = canvas.offsetWidth * 2; // Retina
            const h = canvas.height = canvas.offsetHeight * 2;
            
            ctx.clearRect(0, 0, w, h);
            
            // Horizon
            const horizonY = h * 0.75;
            
            // Sun Path (Sine approximation for visual)
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 165, 0, 0.3)';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            for (let x = 0; x <= w; x+=5) {
                const progress = x / w; // 0 to 1 (Sunrise to Sunset approx)
                const y = horizonY - Math.sin(progress * Math.PI) * (h * 0.55);
                if (x===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // Current Sun Position
            // Map time to x (Sunrise = 10%, Sunset = 90%)
            const dayDuration = times.sunset - times.sunrise;
            const timeSinceRise = targetDate - times.sunrise;
            let sunProgress = timeSinceRise / dayDuration;
            if (sunProgress < 0) sunProgress = 0; 
            if (sunProgress > 1) sunProgress = 1;
            
            // Map 0..1 to canvas width (with padding)
            const sunX = w * 0.1 + (sunProgress * w * 0.8);
            const sunY = horizonY - Math.sin(sunProgress * Math.PI) * (h * 0.55);

            // Draw Sun
            if (altDeg > -6) { // Only draw if visible or twilight
                ctx.beginPath();
                ctx.fillStyle = '#ff9500';
                ctx.shadowColor = '#ff9500';
                ctx.shadowBlur = 20;
                ctx.arc(sunX, sunY, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw Horizon Line
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(128,128,128,0.3)';
            ctx.lineWidth = 2;
            ctx.moveTo(0, horizonY);
            ctx.lineTo(w, horizonY);
            ctx.stroke();

            // --- TRAINSPOTTER FEATURES ---
            
            // 1. Kompass Update
            // Azimuth: 0 is South in SunCalc formula used here? Let's check conversion.
            // Standard: 0=S, 90=W, 180=N, 270=E (radians)
            // Compass: 0=N, 90=E, 180=S, 270=W
            // Conversion: (azimuth * 180/PI) + 180
            const azimuthDeg = (pos.azimuth * (180/Math.PI)) + 180;
            const compassArrow = document.getElementById('compass-arrow');
            if(compassArrow) compassArrow.style.transform = `rotate(${azimuthDeg}deg)`;

            // 2. Text Update
            const dirs = ['N', 'NO', 'O', 'SO', 'S', 'SW', 'W', 'NW', 'N'];
            const dirIndex = Math.round(azimuthDeg / 45) % 8;
            const dirText = document.getElementById('sun-direction-text');
            if(dirText) dirText.textContent = `${dirs[dirIndex]} (${Math.round(azimuthDeg)}°)`;

            // 3. Licht-Qualität (Schatten)
            const altText = document.getElementById('sun-altitude-text');
            let shadowText = "Kein Licht";
            if (altDeg > 0) {
                if (altDeg < 15) shadowText = "Weiches Licht (Lange Schatten)";
                else if (altDeg < 45) shadowText = "Mittlere Schatten";
                else shadowText = "Hartes Licht (Kurze Schatten)";
            }
            if(altText) altText.textContent = `Höhe: ${Math.round(altDeg)}° • ${shadowText}`;

            // 4. Slider Sync (nur wenn nicht simuliert, damit er mitläuft)
            const slider = document.getElementById('sun-slider');
            if (!simulatedTime && slider) {
                slider.value = targetDate.getHours() * 60 + targetDate.getMinutes();
                document.getElementById('sim-time-display').textContent = fmt(targetDate);
            } else if (simulatedTime) {
                document.getElementById('sim-time-display').textContent = fmt(targetDate);
            }
        }

        // Slider Events
        document.getElementById('sun-slider').addEventListener('input', (e) => {
            const min = parseInt(e.target.value);
            const d = new Date();
            d.setHours(Math.floor(min/60), min%60, 0, 0);
            simulatedTime = d;
            if(window.lastKnownPos) updateSunWidget(window.lastKnownPos.lat, window.lastKnownPos.lon);
        });
        
        document.getElementById('sim-reset-btn').addEventListener('click', () => {
            simulatedTime = null;
            if(window.lastKnownPos) updateSunWidget(window.lastKnownPos.lat, window.lastKnownPos.lon);
        });

        // Hook into Geolocation to update sun widget
        if (window.rxGetPosition) {
            window.rxGetPosition().then(pos => {
                updateSunWidget(pos.coords.latitude, pos.coords.longitude);
            });
        } else {
            // Fallback
            navigator.geolocation.getCurrentPosition(pos => {
                updateSunWidget(pos.coords.latitude, pos.coords.longitude);
            });
        }
    </script>
</body>
